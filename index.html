<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basketball Scoreboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="scoreboard">

        <!-- HOME -->
        <div class="team">
            <h2>HOME</h2>

            <div class="score" id="home-score">
                0
            </div>

            <div class="buttons">
                <button id="home-plus1" onclick="hp1()">+1</button>
                <button id="home-plus2" onclick="hp2()">+2</button>
                <button id="home-plus3" onclick="hp3()">+3</button>
            </div>
        </div>

        <!-- GUEST -->
        <div class="team">
            <h2>GUEST</h2>

            <div class="score" id="guest-score">
                0
            </div>

            <div class="buttons">
                <button id="guest-plus1" onclick="gp1()">+1</button>
                <button id="guest-plus2" onclick="gp2()">+2</button>
                <button id="guest-plus3" onclick="gp3()">+3</button>
            </div>
        </div>

    </div>

    <script src="index.js"></script>
</body>

</html>
